<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Wedding Countdown ❤️</title>

    <link rel="stylesheet" href="./style.css?v=20260623-1" />
    <script src="./script.js?v=20260623-1" defer></script>
</head>
<body>
    <header class="site-header">
        <h1>💍 Our Wedding Countdown</h1>
        <p id="countdown">Loading countdown...</p>
    </header>

    <main class="site-main">
        <div id="calendar" class="calendar" aria-label="Wedding countdown calendar"></div>
    </main>

    <div id="modal" class="modal hidden" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button id="closeBtn" class="close-btn" aria-label="Close">×</button>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>
</body>
</html>
