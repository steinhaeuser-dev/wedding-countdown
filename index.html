<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unser Hochzeits-Countdown ❤️</title>

    <link rel="stylesheet" href="./style.css?v=20260625-2" />
    <script src="./script.js?v=20260625-2" defer></script>
</head>
<body>
    <header class="site-header">
        <h1>💍 Unser Hochzeits-Countdown</h1>
        <p id="countdown">Countdown wird geladen...</p>
    </header>

    <main class="site-main">
        <div id="calendar" class="calendar" aria-label="Hochzeitskalender"></div>
    </main>

    <div id="modal" class="modal hidden" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button id="closeBtn" class="close-btn" aria-label="Schließen">×</button>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>
</body>
</html>
